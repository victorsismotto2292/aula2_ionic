<ion-header [translucent]="true">
  <ion-toolbar color="light">
    <ion-title color="primary" style="text-align: center;">
      Exercícios - Radio Label
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <ion-alert
    trigger="ver-desconto"
    header="Valor total:"
    message="{{res_ex1}}"
    [buttons]="alertButtons"
  ></ion-alert>

  <div style="background-color: rgb(247, 210, 4); padding: 5px; display: flex; flex-wrap: wrap; flex-direction: column;">
    <h1 style="text-align: center; font-size: 1.5rem;"><strong>Exercício 1</strong></h1>
    <ion-input label="Digite o valor da compra" labelPlacement="floating" placeholder="Apenas números positivos" [(ngModel)]="valor_compra"></ion-input><br>
    <ion-radio-group value="desconto" [(ngModel)]="tipoDesconto">
      <p>Selecione o tipo de desconto:</p>
      <ion-radio value="vista">Desconto a vista</ion-radio><br><br>
      <ion-radio value="prazo">Desconto a prazo</ion-radio><br><br>
      <ion-radio value="PIX">PIX</ion-radio><br><br>
    </ion-radio-group>

    <ion-button expand="block" id="ver-desconto" (click)="Desconto()">Calcular</ion-button>
  </div>
</ion-content>
